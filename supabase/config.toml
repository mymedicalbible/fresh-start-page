# https://supabase.com/docs/guides/cli/config
project_id = "medical-tracker"

[api]
enabled = true

# Require a valid Supabase user JWT (gateway rejects anonymous calls before Edge code runs).
[functions.transcribe-visit]
verify_jwt = true

[functions.generate-summary]
verify_jwt = true

# Cron/script uses shared secret header, not end-user JWT.
[functions.push-reminders]
verify_jwt = false
