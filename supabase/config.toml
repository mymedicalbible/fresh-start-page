# https://supabase.com/docs/guides/cli/config
project_id = "medical-tracker"

[api]
enabled = true

# Lets logged-in users invoke even if session/JWT edge cases fail; function auth is AssemblyAI secret server-side.
[functions.transcribe-visit]
verify_jwt = false

[functions.generate-summary]
verify_jwt = false

[functions.push-reminders]
verify_jwt = false
